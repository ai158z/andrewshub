name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.9'

      - name: Set up Docker
        run: |
          sudo apt update
          sudo apt install -y docker.io

      - name: Set up ROS2
        run: |
          docker run --rm -d --name ros2-core \
            -v /tmp/ros2:/tmp/ros2 \
            ros:foxy-ros-base \
            bash -c "apt update && apt install -y ros-foxy-ros-base && ros2 daemon start"

      - name: Cache pip dependencies
        uses: actions/cache@v2
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint code
        run: |
          pip install flake8
          flake8 --version
          flake8 . --count --select=E9,F63,F72,F82 --show-source
          flake8 . --count --exit-zero

      - name: Run tests
        run: |
          pytest --version
          pytest tests/ -v

      - name: Build Docker image
        if: ${{ github.event_name == 'push' }}
        run: |
          docker build -t quantum-sensory-feedback-android:latest .

      - name: Run Docker container
        if: ${{ github.event_name == 'push' }}
        run: |
          docker run -d --name qsf-container \
            --env ROS_HOSTNAME=localhost \
            --env ROS_MASTER_URI=http://localhost:11311 \
            quantum-sensory-feedback-android:latest \
            ros2 run ros1_bridge dynamic_bridge