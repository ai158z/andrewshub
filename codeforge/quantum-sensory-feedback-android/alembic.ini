# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# default for 'main' db is 'app/env.py'
# for 'other' db: 'app/env.py'
prepend_sys_path = .

# max length of characters to apply to the
# "-m" (message) argument to alembic revision
max_length = 50

# set to 'true' to run the environment in-place during
# configuration, not supported on some environments
# in_production = false

# max number of seconds to wait for a connection to be available
# when using the default alembic connection pool
# connection_timeout = 30

# max number of seconds to wait for a query to execute
# before raising a timeout error
# statement_timeout = 30

# set to 'true' to keep the pyc files
# keep_pycs = false

# version number of the source code
# source_revision = 

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[logger_root]
level = WARN
handlers = console
qualname = root

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handlers]
keys = console

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatters]
keys = generic

[formatter_generic]
format = %%(levelname)-5.5s [%%(name)s] %%(message)s
datefmt = %%H:%%M:%%S