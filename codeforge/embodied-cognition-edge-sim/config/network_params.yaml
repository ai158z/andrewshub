# Network simulation parameters for embodied-cognition-edge-sim
network_simulation:
  # Basic network parameters
  bandwidth:
    # Bandwidth in Mbps for different network types
    edge_network:
      min: 50
      max: 1000
      default: 100
    cloud_network:
      min: 100
      max: 10000
      default: 1000
    local_network:
      min: 1000
      max: 10000
      default: 5000
  
  latency:
    # Latency parameters in milliseconds
    edge_to_edge:
      min: 1
      max: 50
      default: 5
    edge_to_cloud:
      min: 10
      max: 200
      default: 50
    local_network:
      min: 0.1
      max: 10
      default: 1
  
  packet_loss:
    # Packet loss rates (percentage)
    edge_network: 0.01
    cloud_network: 0.001
    local_network: 0.0001
  
  jitter:
    # Jitter parameters in milliseconds
    edge_network:
      min: 0.1
      max: 5
      default: 1
    cloud_network:
      min: 0.01
      max: 2
      default: 0.5
    local_network:
      min: 0.001
      max: 1
      default: 0.1

  # Network topology settings
  topology:
    # Maximum number of hops in the network
    max_hops: 10
    # Default network depth for simulation
    default_depth: 3
    # Connection types
    connection_types:
      - "TCP"
      - "UDP"
      - "QUIC"
      - "WebSocket"

  # Quality of Service settings
  qos:
    reliability: "reliable"  # Options: "reliable", "best_effort"
    durability: "transient_local"  # Options: "transient_local", "volatile"
    history: "keep_last"  # Options: "keep_last", "keep_all"
    depth: 10  # History depth for keep_last

  # Simulation parameters
  simulation:
    # Time parameters
    time_step: 0.1  # Simulation time step in seconds
    max_simulation_time: 3600  # Maximum simulation time in seconds
    # Node distribution
    edge_nodes:
      min: 1
      max: 100
      default_count: 10
    # Data flow parameters
    data_rate:
      min: 1
      max: 1000
      default: 10  # Messages per second
    message_size:
      min: 1
      max: 10000
      default: 100  # Bytes

  # Network failure simulation parameters
  failure_simulation:
    enable_failures: true
    failure_rate: 0.05  # 5% failure rate
    recovery_time:
      min: 1
      max: 60
      default: 5  # seconds

  # Network security parameters
  security:
    encryption_enabled: true
    authentication_enabled: true
    tls_version: "1.3"

# Node-specific network configurations
edge_nodes:
  # Default configuration for edge nodes
  default_config:
    processing_rate: 100  # Messages per second
    buffer_size: 1024  # KB
    timeout: 30  # seconds
    max_connections: 50

# Visualization settings
visualization:
  update_interval: 1.0  # seconds
  enable_realtime: true
  data_format: "json"
  max_data_points: 1000

# Physical interface parameters
physical_interface:
  # Sensor data simulation
  sensor_data:
    update_rate: 10  # Hz
    noise_level: 0.01  # 1% noise
  actuator_control:
    response_time: 0.05  # seconds
    precision: 0.99  # 99% precision

# Decision analyzer parameters
decision_analyzer:
  # Decision making parameters
  decision_threshold: 0.75
  confidence_interval: 0.95
  processing_delay: 0.1  # seconds

# Global integration parameters
global_integration:
  # Integration parameters
  sync_interval: 5  # seconds
  data_fusion_rate: 20  # Hz
  reconciliation_threshold: 0.1  # 10% difference threshold

# Latency modeling parameters
latency_model:
  # Latency distribution parameters
  distribution: "normal"  # normal, uniform, or custom
  mean_latency: 50  # milliseconds
  latency_variance: 10  # milliseconds
  max_deviation: 200  # milliseconds

# Edge processing parameters
edge_processor:
  # Processing parameters
  batch_size: 10
  processing_delay: 0.01  # seconds
  queue_size: 1000
  parallel_threads: 4

# Node coordination parameters
node_coordinator:
  # Coordination parameters
  sync_timeout: 30  # seconds
  heartbeat_interval: 5  # seconds
  failure_detection: 2  # seconds
  max_heartbeat_misses: 3

# Data flow visualization parameters
data_flow_visualizer:
  # Visualization parameters
  refresh_rate: 1  # Hz
  buffer_size: 10000  # data points
  enable_tracing: true

# TF2 parameters for coordinate transformations
tf2_params:
  # TF2 configuration
  cache_time: 10  # seconds
  publish_frequency: 100  # Hz
  max_extrapolation: 0.1  # seconds

# ROS2 QoS parameters
ros2_qos:
  # Quality of service settings
  sensor_data_qos:
    reliability: "best_effort"
    durability: "volatile"
    history: "keep_last"
    depth: 10
  parameter_qos:
    reliability: "reliable"
    durability: "transient_local"
    history: "keep_last"
    depth: 50
  service_qos:
    reliability: "reliable"
    durability: "transient_local"
    history: "keep_last"
    depth: 10

# Network interface parameters
network_interfaces:
  # Interface configuration
  edge_interface:
    protocol: "UDP"
    port: 8080
    buffer_size: 65536  # bytes
  cloud_interface:
    protocol: "TCP"
    port: 9090
    buffer_size: 1048576  # bytes
  local_interface:
    protocol: "Unix"
    buffer_size: 2097152  # bytes

# Health check parameters
health_check:
  # Health monitoring settings
  enable_monitoring: true
  check_interval: 30  # seconds
  failure_threshold: 3  # consecutive failures before alert
  timeout: 10  # seconds

# Logging parameters
logging:
  # Logging configuration
  level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "time|level|node|message"
  file_path: "/var/log/embodied_edge_sim.log"
  max_size: 10485760  # 10MB
  backup_count: 5

# Security parameters
security:
  # Security configuration
  enable_encryption: true
  enable_authentication: true
  token_expiry: 3600  # seconds
  cert_path: "/etc/ssl/certs"
  key_path: "/etc/ssl/private"