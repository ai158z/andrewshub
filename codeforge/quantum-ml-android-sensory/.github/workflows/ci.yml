name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --version
        python -m pip install -r requirements.txt
        python -m pip install torch
        pip install pytest
        pip install numpy scipy qiskit qiskit-machine-learning pandas

    - name: Run tests
      run: |
        pytest

  ci:
    runs-on: ubuntu-latest
    
    services:
      python: "3.9"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@2
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --version
        python -m pip install -r requirements.txt
        python -m pip install torch
        pip install numpy scipy qiskit qiskit-machine-learning pandas
        pip install pytest
        python -m pip install -r requirements.txt
        python -m pip install torch
        pip install numpy scipy qiskit qiskit-machine-learning pandas
        pip install pytest

    - name: Run tests
      run: |
        pytest

    - name: Lint and format check
      run: |
        python -m pip install black
        python -m pip install flake8
        python -m pip install isort
        python -m pip install mypy
        python -m pip install numpy scipy qiskit qiskit-machine-learning torch pandas
        python -m pip install pytest
        python -m pip install -r requirements.txt
        python -m pip install torch
        pip install numpy scipy qiskit qisk