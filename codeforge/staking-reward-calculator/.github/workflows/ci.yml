name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint and Format Check
      run: |
        pip install flake8 black
        flake8 .
        black --check .

    - name: Run tests
      run: |
        pip install pytest
        python -m pytest

    - name: Build
      run: |
        echo "Building staking-reward-calculator CLI..."
        python -m pip install -e .

    - name: Docker build
      run: |
        if [ -f "Dockerfile" ]; then
          docker build -t staking-reward-calculator:latest .
        else
          echo "No Dockerfile found, skipping Docker build"
        fi