name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: 3.11
  NODE_VERSION: "18"

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
      #     python-version: 3.11
      #     cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Redis
        uses: actions/setup-redis@v1
        with:
          redis-version: "6.2"

      - name: Set up Docker
        uses: docker/setup-docker@v1

      - name: Start Redis
        run: |
          redis-server &

      - name: Run tests
        run: |
          pytest

      - name: Lint code
        run: |
          flake8

      - name: Build Docker image
        run: |
          docker build -t staking-reward-calculator .

      - name: Build and push Docker image
        run: |
          docker build -t staking-reward-calculator .

      - name: Push to Docker Hub
        run: |
          docker push staking-reward-calculator

    services:
      redis:
        image: redis:latest
        ports:
          - 6379
        options: >-
          --name redis
          --network host
          redis