name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
            python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          fl-ake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics
      - name: Format check with black
        run: |
          pip install black
          black --check .

  test:
    runs-on: ubuntu-latest
    services:
      blockchain-node:
        image: trufflesuite/ganache:v6.12.2
        ports:
          - 8545:8545
      api-endpoint:
        image: mock-api:latest
        ports:
          - 8080:8080
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install web3>=6.0.0 requests>=2.28.0 pandas>=1.5.0 matplotlib>=3.5.0 seaborn>=0.11.0 pydantic>=1.10.0 typing-extensions>=4.4.0
      - name: Run tests
        run: pytest

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Build executable
        run: |
          pip install web3>=6.0.0 requests>=2.28.0 pandas>=1.5.0 matplotlib>=3.5.0 seaborn>=0.11.0 pydantic>=1.10.0 typing-extensions>=4.4.0
          pyinstaller --onefile staking_reward_calculator.py

  docker:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker image
        run: |
          docker build . --file Dockerfile --tag staking-reward-calculator:latest
      - name: Login to DockerHub
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
      - name: Push to DockerHub
        run: |
          docker tag staking-reward-calculator:latest ${{ secrets.DOCKER_USERNAME }}/staking-reward-calculator:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/staking-reward-calculator:latest