name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
 
    services:
      redis:
        image: redis:6.0
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python 3.8
        uses: actions/setup-python@v2
        with:
          python-version: 3.8

      - name: Cache dependencies
        uses: actions/cache@v2
        with:
          path: ~/cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest

      - name: Build and Test
        run: |
          pytest

      - name: Lint code
        run: |
          flake8 . --count --select=C001,C002,C003 --count --show-source --statistics
          black --check .

      - name: Run all tests
        run: |
          pytest

      - name: Build step
        run: |
          python -m pip install -r requirements.txt
          python -m build

      - name: Build step
        run: |
          python -m build

      - name: Docker build
        run: |
          docker build -t ai-skill-library-framework .

      - name: Run all tests
        run: |
          pytest

      - name: Build step
        run: |
          python -m build

      - name: Docker build
        run: |
          docker build -t ai-skill-library-framework .

      - name: Docker build
        run: |
          docker build -t ai-skill-library-framework .