name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  ci:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install pydantic>=2.0.0 sqlalchemy>=2.0.0 alembic>=1.10.0 cryptography>=3.0.0 pyyaml>=6.0 jsonschema>=4.0.0
        pip install -e .

    - name: Lint check
      run: |
        pip install flake8
        flake8 .

    - name: Format check
      run: |
        pip install black
        black --check .

    - name: Run tests
      run: |
        pytest tests/ -v --cov=src/

    - name: Build package
      run: |
        python -m build

    - name: Docker build
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      run: |
        docker build -t stop-framework-skill-library:${{ github.sha }} .
      env:
        DOCKER_BUILDKIT: 1